on:
  pull_request:
    branches:
    - 1.0.0
    
jobs:
  publish:
    runs-on: linux
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v1
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel twine
    - name: Build and publish
      run: |
        sh setup.sh
